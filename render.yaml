databases:
  - name: aonegt-db
    databaseName: aonegt_db
    user: aonegt_user
    plan: free

services:
  - type: web
    name: aonegt-api
    plan: free
    runtime: python
    buildCommand: ./build.sh
    startCommand: gunicorn aonegt.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DEBUG
        value: "False"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: aonegt-db
          property: connectionString